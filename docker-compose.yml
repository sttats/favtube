services:
  backend-node:
    build:
      context: .
      dockerfile: backend-node/Dockerfile
    ports:
      - "3000:3000"
  backend-fastapi:
    build:
      context: .
      dockerfile: backend-fastapi/Dockerfile
    ports:
      - "3001:3001"
  backend-go:
    build:
      context: .
      dockerfile: backend-go/Dockerfile
    ports:
      - "3002:3002"
  backend-cs:
    build:
      context: .
      dockerfile: backend-cs/Dockerfile
    ports:
      - "3003:3003"

  backend-java:
    build:
      context: .
      dockerfile: backend-java/Dockerfile
    ports:
      - "3004:3004"
      
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
        - backend-node
        - backend-fastapi
        - backend-go
        - backend-cs
        - backend-java